name: Logility Rate Limits
description: Logility does not publish public rate limit documentation. As an enterprise supply chain planning platform, API rate limits and throttling policies are defined per customer contract and negotiated as part of the enterprise agreement. Customers should consult their Logility account team or client services for specific rate limit details applicable to their deployment.
url: https://www.logility.com/contact-us/
