rateLimits:
  - name: Enterprise API Rate Limits
    description: Rate limits are configured on a per-customer basis as part of the enterprise deployment agreement. No publicly documented limits are available; limits vary based on contract tier, number of concurrent users, data volume, and deployment configuration.
    notes:
      - Rate limits are not publicly disclosed
      - Limits are established per customer enterprise agreement
      - Contact Logility client services for specific rate limit details
      - AppCentral's orchestration layer manages real-time signal processing with performance SLAs defined per contract
